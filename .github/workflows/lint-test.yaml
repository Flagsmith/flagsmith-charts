name: Lint and Test Charts

on: pull_request

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Envsubst
        uses: danielr1996/envsubst-action@1.0.0
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
        with:
          input: charts/flagsmith/ci/e2e-test-values.yaml
          output: charts/flagsmith/ci/e2e-test-values.yaml

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.7.0

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --config ct.yaml)
          if [[ -n "$changed" ]]; then
            echo "::set-output name=changed::true"
          fi

      - name: Run chart-testing (lint)
        run: ct lint --config ct.yaml --lint-conf lintconf.yaml --check-version-increment=false

      - name: Create kind cluster
        uses: helm/kind-action@v1.12.0
        if: steps.list-changed.outputs.changed == 'true'
        with:
          node_image: kindest/node:v1.31.4

      - name: Install Gateway API CRDs
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          helm template eg oci://docker.io/envoyproxy/gateway-crds-helm \
            --version v1.7.0 \
            --set crds.gatewayAPI.enabled=true \
            --set crds.gatewayAPI.channel=standard \
            --set crds.envoyGateway.enabled=true \
            | kubectl apply --server-side -f -

      # - name: Install Envoy Gateway
      #   if: steps.list-changed.outputs.changed == 'true'
      #   run: |
      #     helm install eg oci://docker.io/envoyproxy/gateway-helm \
      #       -n envoy-gateway-system --create-namespace --wait
      #
      # - name: Create GatewayClass and Gateway
      #   if: steps.list-changed.outputs.changed == 'true'
      #   run: |
      #     kubectl apply -f - <<'EOF'
      #     apiVersion: gateway.networking.k8s.io/v1
      #     kind: GatewayClass
      #     metadata:
      #       name: eg
      #     spec:
      #       controllerName: gateway.envoyproxy.io/gatewayclass-controller
      #     ---
      #     apiVersion: gateway.networking.k8s.io/v1
      #     kind: Gateway
      #     metadata:
      #       name: test-gateway
      #     spec:
      #       gatewayClassName: eg
      #       listeners:
      #         - name: http
      #           port: 80
      #           protocol: HTTP
      #           allowedRoutes:
      #             namespaces:
      #               from: All
      #     EOF

      - name: Run chart-testing (install)
        run: ct install --config ct.yaml
